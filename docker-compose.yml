# YBJJ Academy — déploiement en une commande :
#   docker compose up -d
# Le site est ensuite servi sur http://localhost:8080
services:
  ybjj-website:
    build: .
    image: ybjj-academy:latest
    container_name: ybjj-academy
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
